<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main">
        <div id="craftLibrary" class="craftInfo">
            <div class="container">
                <span style="font-weight: bold;">标准工序库</span>
                <span style="color: #66758c;font-size: 13px;">拖拽到右侧编辑区</span>
                <hr>
                <div id="library_show">
                </div>
                <div id="library_add">
                    <svg id="_add" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="2575" width="1.5em" height="1.5em"><path d="M533.333333 490.666667V128h-42.666666v362.666667H128v42.666666h362.666667v362.666667h42.666666V533.333333h362.666667v-42.666666z" fill="#3D3D3D" p-id="2576"></path></svg>
                </div>
            </div>
        </div>
        <div id="craftList" class="craftInfo">
            <div class="container">
                <div id="list_title">
                    <span style="font-weight: bold;">工艺列表</span>
                    <div id="list_add">新建工艺</div>
                </div>
                <hr>
                <div id="list_show">
                    <!-- <div class="listNormal">
                        <span class="spanNormal">未命名</span>
                    </div> -->
                </div>
                <div id="list_delete">删除当前工艺</div>
            </div>
        </div>
        <div id="craftEditor" class="craftInfo">
            <div class="container1">
                <div id="editor_title">
                    <span style="font-weight: bold;">工艺：</span>
                    <div id="editor_btn">
                        <div id="editor_remove">清空工序</div>
                        <div id="editor_save">保存工艺</div>
                    </div>
                </div>
                <hr>
                <div id="editor_main" style="color: rgba(128, 128, 128, 0.80);">
                    <div id="editor_show">
                        <!-- <div class="editorNormal">
                            <span style="margin-left: 10px;">测试</span>
                            <div class="editor_delete">删除</div>
                        </div> -->
                        <div style="margin: auto;">将左侧工序拖放到此处</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
