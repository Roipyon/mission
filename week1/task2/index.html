<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDoList</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div id="create">
            <input type="text" id="createInput">
            <div id="createBtn">创建</div>
        </div>
        <div id="things">
            <div id="sign"></div>
            <div class="thing">
                <div class="do"></div>
                <span>待办事项</span>
                <span>修改</span>
                <span>删除</span>
            </div>
        </div>
    </main>
</body>
<script src="script.js"></script>
</html>
